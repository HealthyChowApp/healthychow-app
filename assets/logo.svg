<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Healthy Chow logo">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2F6B3C"/>
      <stop offset="1" stop-color="#1E4F2B"/>
    </linearGradient>
  </defs>

  <!-- MARK: leaf that doubles as a location pin, with a checkmark vein -->
  <g transform="translate(40,40)">
    <!-- pin/leaf body -->
    <path d="M120 12
             C176 12 224 56 224 116
             C224 176 168 220 120 248
             C72 220 16 176 16 116
             C16 56 64 12 120 12 Z"
          fill="url(#leafGrad)"/>
    <!-- checkmark vein = "the right pick" -->
    <path d="M82 128 L110 158 L168 92"
          stroke="#F4B23E" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(300,0)">
    <text x="0" y="180" font-family="Verdana, 'DejaVu Sans', sans-serif" font-weight="700" font-size="96" letter-spacing="-3" fill="#1E4F2B">Healthy</text>
    <text x="0" y="278" font-family="Verdana, 'DejaVu Sans', sans-serif" font-weight="700" font-size="96" letter-spacing="-3" fill="#F4B23E">Chow</text>
    <!-- tagline -->
    <text x="6" y="312" font-family="Verdana, 'DejaVu Sans', sans-serif" font-weight="400" font-size="22" letter-spacing="6" fill="#5A6B5E">EAT OUT. EAT RIGHT.</text>
  </g>
</svg>
